<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Solid background — gradients can silently fail in some SVG renderers
       (librsvg on Linux, iOS WebKit…) and produce transparent pixels that
       appear white. A flat colour is 100 % reliable. -->
  <rect width="512" height="512" fill="#2E5BFF"/>

  <!-- Subtle dark overlay at the bottom for depth -->
  <rect x="0" y="300" width="512" height="212" fill="#0C1FA0" opacity="0.45"/>

  <!-- Document shadow -->
  <rect x="122" y="92" width="278" height="348" rx="22" fill="rgba(0,0,0,0.20)"/>

  <!-- Document body -->
  <rect x="114" y="82" width="278" height="348" rx="22" fill="white"/>

  <!-- Folded corner -->
  <path d="M340 82 L392 134 H340 V82 Z" fill="rgba(46,91,255,0.12)"/>

  <!-- Text lines -->
  <rect x="152" y="178" width="196" height="14" rx="7" fill="#C2D0FF"/>
  <rect x="152" y="208" width="164" height="14" rx="7" fill="#C2D0FF"/>
  <rect x="152" y="238" width="182" height="14" rx="7" fill="#C2D0FF"/>
  <rect x="152" y="268" width="136" height="14" rx="7" fill="#C2D0FF"/>
  <rect x="152" y="298" width="154" height="14" rx="7" fill="#C2D0FF"/>

  <!-- Headphones badge -->
  <circle cx="342" cy="388" r="56" fill="#1A44E8"/>
  <circle cx="342" cy="388" r="56" fill="none" stroke="white" stroke-width="5" opacity="0.25"/>
  <path d="M318 385 C318 368 329 355 342 355 C355 355 366 368 366 385"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <rect x="308" y="383" width="14" height="20" rx="7" fill="white"/>
  <rect x="360" y="383" width="14" height="20" rx="7" fill="white"/>

</svg>
